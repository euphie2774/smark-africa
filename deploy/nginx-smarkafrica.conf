limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=mpesa_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=search_limit:10m rate=120r/m;

upstream smarkafrica_app {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name smark-africa.com www.smark-africa.com;
    client_max_body_size 30m;

    access_log /var/log/nginx/smarkafrica.access.log;
    error_log /var/log/nginx/smarkafrica.error.log warn;

    location /static/uploads/ {
        alias /srv/smarkafrica/static/uploads/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location /static/ {
        alias /srv/smarkafrica/static/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location = /login {
        limit_req zone=login_limit burst=5 nodelay;
        proxy_pass http://smarkafrica_app;
        include /etc/nginx/proxy_params;
    }

    location = /mpesa/callback {
        limit_req zone=mpesa_limit burst=20 nodelay;
        proxy_pass http://smarkafrica_app;
        include /etc/nginx/proxy_params;
    }

    location /checkout {
        limit_req zone=mpesa_limit burst=20 nodelay;
        proxy_pass http://smarkafrica_app;
        include /etc/nginx/proxy_params;
    }

    location /shop {
        limit_req zone=search_limit burst=60 nodelay;
        proxy_pass http://smarkafrica_app;
        include /etc/nginx/proxy_params;
    }

    location / {
        proxy_pass http://smarkafrica_app;
        include /etc/nginx/proxy_params;
    }
}
