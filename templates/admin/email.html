{% extends "base.html" %}
{% block title %}Email Broadcast - {{ super() }}{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-envelope me-2"></i>Email Broadcast</h2>
    </div>

    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <h5 class="mb-3">Send Email to All Users</h5>
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <div class="mb-3">
                    <label class="form-label">Subject *</label>
                    <input type="text" name="subject" class="form-control" required placeholder="e.g., New Products Available!">
                </div>
                <div class="mb-3">
                    <label class="form-label">Message Body (Plain Text) *</label>
                    <textarea name="body" class="form-control" rows="8" required placeholder="Write your message here..."></textarea>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" name="send_test" id="send_test" class="form-check-input" value="1">
                    <label class="form-check-label" for="send_test">Send test email to admin first</label>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success btn-lg px-4"><i class="fas fa-paper-plane me-2"></i> Send Broadcast</button>
                    <button type="submit" name="preview" value="1" class="btn btn-outline-secondary btn-lg"><i class="fas fa-eye me-2"></i> Preview</button>
                </div>
            </form>
        </div>
    </div>

    {% if preview %}
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white">
            <h5 class="mb-0">Preview</h5>
        </div>
        <div class="card-body">
            <h6>Subject: {{ preview.subject }}</h6>
            <hr>
            <pre style="white-space: pre-wrap; font-family: inherit;">{{ preview.body }}</pre>
        </div>
    </div>
    {% endif %}
</div>
{% endblock %}
