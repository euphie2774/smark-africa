{% extends "base.html" %}
{% block title %}MVP Documentation Access - SMARKAFRICA{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-body text-center p-5">
                    <i class="fas fa-lock fa-3x text-warning mb-3"></i>
                    <h3>MVP Documentation Access</h3>
                    <p class="text-muted">This documentation contains confidential platform details. Enter your MVP password to access.</p>
                    <form method="POST" action="{{ url_for('admin_print_documentation_mvp') }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                        <div class="mb-3">
                            <input type="password" name="auth" class="form-control form-control-lg text-center" placeholder="Enter MVP Password" required>
                        </div>
                        <button type="submit" class="btn btn-warning btn-lg"><i class="fas fa-unlock me-2"></i>Access Documentation</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
