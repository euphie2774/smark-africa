{% extends "base.html" %}
{% block title %}Featured Placement - {{ super() }}{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h3><i class="fas fa-star me-2"></i>Bid for Featured Placement</h3>
            <p class="text-muted">Place your product or business in premium positions on the platform. Highest bid wins the slot.</p>
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <div class="mb-3">
                    <label class="form-label">Business/Brand Name</label>
                    <input type="text" class="form-control" name="business_name" value="{{ current_user.username }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Product (optional)</label>
                    <select class="form-select" name="product_id">
                        <option value="">-- General brand placement --</option>
                        {% for p in products %}
                        <option value="{{ p.id }}">{{ p.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Placement Slot</label>
                    <select class="form-select" name="slot">
                        <option value="homepage_hero">Homepage Hero (Top banner)</option>
                        <option value="category_top">Category Page Top</option>
                        <option value="search_top">Search Results Top</option>
                    </select>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Bid Amount (KSh)</label>
                        <input type="number" class="form-control" name="bid_amount" min="500" step="100" value="1000" required>
                        <div class="form-text">Minimum KSh 500</div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Duration (days)</label>
                        <input type="number" class="form-control" name="duration_days" min="1" max="30" value="7">
                    </div>
                </div>
                <button type="submit" class="btn btn-warning btn-lg"><i class="fas fa-gavel me-2"></i>Place Bid</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
